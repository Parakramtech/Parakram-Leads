name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.PUBLIC_API_URL || 'https://leads.getparakram.in/api/v1' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  brand-site:
    name: Deploy Brand Site to Cloudflare Pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Design\ Parakram\ Ecosystem\ Website\ \(1\)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy ./dist --project-name parakram --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [docker]
    if: vars.VPS_ENABLED == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Check required secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "VPS_HOST not set — skipping VPS deploy"
            exit 1
          fi
        shell: bash

      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            cd /opt/sigma-lead-intelligence
            git pull
            export GITHUB_REPOSITORY=${{ github.repository }}
            export GITHUB_SHA=${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull backend celery_worker celery_beat frontend
            docker compose -f docker-compose.prod.yml up -d --force-recreate --build
            docker system prune -af --filter "until=24h"
