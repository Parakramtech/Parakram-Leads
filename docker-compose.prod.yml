services:
   postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sigma
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: sigma_leads
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sigma_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigma -d sigma_leads"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    networks:
      - sigma_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/varshinicb1/parakram-leads/backend:${GITHUB_SHA:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    networks:
      - sigma_network

  celery_worker:
    image: ghcr.io/varshinicb1/parakram-leads/backend:${GITHUB_SHA:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    command: celery -A app.workers.celery_app worker -l info -Q default -c 4
    networks:
      - sigma_network

  celery_beat:
    image: ghcr.io/varshinicb1/parakram-leads/backend:${GITHUB_SHA:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    command: celery -A app.workers.celery_app beat -l info --scheduler celery.beat:PersistentScheduler
    networks:
      - sigma_network

  whatsapp_bridge:
    build: ./whatsapp-bridge
    restart: unless-stopped
    depends_on:
      - redis
    env_file: .env
    networks:
      - sigma_network

  frontend:
    image: ghcr.io/varshinicb1/parakram-leads/frontend:${GITHUB_SHA:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sigma_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - sigma_network

volumes:
  postgres_data:

networks:
  sigma_network:
    driver: bridge
