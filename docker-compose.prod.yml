services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sigma
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sigma}
      POSTGRES_DB: sigma_leads
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sigma_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - sigma_network

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file: .env
    networks:
      - sigma_network

  celery_worker:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file: .env
    command: celery -A app.workers.celery_app worker -l info -Q default -c 4
    networks:
      - sigma_network

  celery_beat:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file: .env
    command: celery -A app.workers.celery_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    networks:
      - sigma_network

  whatsapp_bridge:
    build: ./whatsapp-bridge
    restart: unless-stopped
    depends_on:
      - redis
    env_file: .env
    networks:
      - sigma_network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://${SERVER_IP}:80/api/v1}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sigma_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - sigma_network

volumes:
  postgres_data:

networks:
  sigma_network:
    driver: bridge
