services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sigma
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sigma}
      POSTGRES_DB: sigma_leads
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sigma_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - sigma_network

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-sigma-lead-intelligence}/backend:${GITHUB_SHA:-latest}
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file: .env
    networks:
      - sigma_network

  celery_worker:
    image: ghcr.io/${GITHUB_REPOSITORY:-sigma-lead-intelligence}/backend:${GITHUB_SHA:-latest}
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file: .env
    command: celery -A app.workers.celery_app worker -l info -Q default -c 4
    networks:
      - sigma_network

  celery_beat:
    image: ghcr.io/${GITHUB_REPOSITORY:-sigma-lead-intelligence}/backend:${GITHUB_SHA:-latest}
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file: .env
    command: celery -A app.workers.celery_app beat -l info --scheduler celery.beat:PersistentScheduler
    networks:
      - sigma_network

  whatsapp_bridge:
    build: ./whatsapp-bridge
    restart: unless-stopped
    depends_on:
      - redis
    env_file: .env
    networks:
      - sigma_network

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-sigma-lead-intelligence}/frontend:${GITHUB_SHA:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sigma_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - sigma_network

volumes:
  postgres_data:

networks:
  sigma_network:
    driver: bridge
